name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger it manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        working-directory: artifacts/netflixy-app
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: artifacts/netflixy-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Netflixy-debug
          path: artifacts/netflixy-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
