kind = "mobile"
previewPath = "/netflixy-app/"
title = "Netflixy"
version = "1.0.0"
id = "artifacts/netflixy-app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/netflixy-app/" ]
localPort = 22683

[services.development]
run = "pnpm --filter @workspace/netflixy-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/netflixy-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/netflixy-app", "run", "serve" ]

[services.env]
PORT = "22683"
BASE_PATH = "/netflixy-app/"
